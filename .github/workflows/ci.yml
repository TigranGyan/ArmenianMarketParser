name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install ruff black mypy bandit pytest pytest-asyncio httpx sqlalchemy elasticsearch fastapi python-jose[cryptography] passlib[bcrypt] python-multipart python-dotenv
        pip install "bcrypt<4.0.0"

    - name: Lint with ruff
      run: ruff check core-api scraper price_worker tests

    - name: Check formatting with black
      run: black --check core-api scraper price_worker tests

    - name: Security scan with bandit
      run: bandit -r core-api scraper price_worker

    - name: Run tests
      env:
        DATABASE_URL: sqlite:///:memory:
        ELASTICSEARCH_URL: http://localhost:9200
        SECRET_KEY: test-secret-key
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)/core-api:$(pwd)/scraper:$(pwd)/price_worker
        pytest tests/

  frontend-checks:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
    - uses: actions/checkout@v4
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: './frontend/package-lock.json'

    - name: Install dependencies
      run: npm install

    - name: Build
      run: npm run build

  docker-build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build core-api
      run: docker build ./core-api
    - name: Build scraper
      run: docker build ./scraper
    - name: Build price_worker
      run: docker build ./price_worker
    - name: Build frontend
      run: docker build ./frontend
